{% extends "layout.html" %}

{% block title %}Edit Profile - TaskFlow{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 px-4">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200 border border-slate-100 overflow-hidden transition-all">
        <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 h-32 relative">
            <div class="absolute -bottom-12 left-1/2 -translate-x-1/2">
                <div class="relative group">
                    <img id="preview"
                        src="{{ url_for('static', filename='uploads/' + user.profile_pic) if user.profile_pic != 'default.png' else 'https://ui-avatars.com/api/?name=' + user.username + '&background=random' }}"
                        alt="Profile Picture"
                        class="w-24 h-24 rounded-2xl object-cover border-4 border-white shadow-lg transition-transform group-hover:scale-105">
                    <label for="file-upload"
                        class="absolute inset-0 bg-black/40 rounded-2xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer text-white">
                        <i class="fas fa-camera"></i>
                    </label>
                </div>
            </div>
        </div>

        <div class="pt-16 pb-10 px-8 sm:px-12">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-slate-900">Profile Settings</h2>
                <p class="text-slate-500 text-sm mt-1">Manage your account information and preferences</p>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                <input id="file-upload" name="profile_pic" type="file" class="sr-only" accept="image/*">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                        <input type="text" name="name" value="{{ user.name or '' }}"
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                        <input type="text" name="username" value="{{ user.username }}"
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all"
                            required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <input type="email" name="email" value="{{ user.email or '' }}"
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                        <input type="tel" name="phone" value="{{ user.phone_number or '' }}"
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <label class="block text-sm font-bold text-slate-700 mb-2">New Password (keep blank to keep
                        current)</label>
                    <input type="password" name="password" placeholder="••••••••"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-save"></i>
                    Update My Profile
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/dashboard"
                    class="text-slate-500 hover:text-slate-700 transition-colors text-sm font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('file-upload').onchange = function (evt) {
        const [file] = this.files
        if (file) {
            document.getElementById('preview').src = URL.createObjectURL(file)
        }
    }
</script>
{% endblock %}
