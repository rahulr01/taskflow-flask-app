<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    form {
        margin-bottom: 20px;
    }

    input {
        padding: 8px;
        width: 200px;
    }

    button {
        padding: 8px 12px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: white;
        padding: 10px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
    }

    a {
        color: red;
        text-decoration: none;
    }
</style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">Welcome {{username}} 🎉</h1>

    <div class="card p-4 mb-4">
    <h3>Add Task</h3>
    <form method = "POST" action="/add_task">
        <input type="text" name="task" placeholder="Enter task" class="form-control" required> <br><br>
        <button type="submit" class="btn btn-success w-20">Add</button>
    </form>
    </div>

    <div class = "card pt-4">
    <h3>Your Tasks</h3>
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between">
            {{ task[1] }}
            <a href="/delete/{{ task[0] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
    </div>
    <br><br>
    <a href="/logout" class="btn btn-secondary w-20">Logout</a>
</div>
</body>
</html>
